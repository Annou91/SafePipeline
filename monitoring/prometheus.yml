global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus scrapes itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Flask app metrics exposed at /metrics
  - job_name: "safepipeline-app"
    static_configs:
      - targets: ["host.docker.internal:5000"]
    metrics_path: /metrics
