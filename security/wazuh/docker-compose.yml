services:

  # -------------------------------------------------------------------
  # Wazuh Manager — receives logs and generates alerts
  # -------------------------------------------------------------------
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    hostname: wazuh-manager
    restart: always
    ports:
      - "1514:1514"       # agent communication (UDP)
      - "1515:1515"       # agent enrollment
      - "55000:55000"     # Wazuh API
    volumes:
      - wazuh_data:/var/ossec/data
      - ./custom-rules.xml:/var/ossec/etc/rules/custom-safepipeline.xml:ro
      - app_logs:/var/log/safepipeline:ro   # Flask app logs
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-

  # -------------------------------------------------------------------
  # Wazuh Indexer — stores and indexes alerts (OpenSearch)
  # -------------------------------------------------------------------
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    hostname: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer

  # -------------------------------------------------------------------
  # Wazuh Dashboard — visualization UI (Kibana-like)
  # -------------------------------------------------------------------
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    hostname: wazuh-dashboard
    restart: always
    ports:
      - "5601:5601"       # access at http://localhost:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    depends_on:
      - wazuh-indexer
      - wazuh-manager

volumes:
  wazuh_data:
  wazuh_indexer_data:
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../../logs   # shared with the Flask app
